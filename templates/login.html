<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoClaw 登入</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2d2d2d; margin: 0; }
        .login-container { background: #1e1e1e; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 320px; color: #fff; }
        h2 { text-align: center; margin-bottom: 20px; color: #4dabf7; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; background: #333; color: #fff; }
        button { width: 100%; padding: 12px; margin-top: 15px; background-color: #4dabf7; color: #1e1e1e; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #3bc9db; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>NanoClaw 終端</h2>
        <form method="POST">
            <input type="password" name="password" placeholder="系統密碼 (預設: pi)" required>
            <input type="text" name="api_key" placeholder="Claude API Key (sk-ant-...)" required>
            <button type="submit">啟動連線</button>
        </form>
    </div>
</body>
</html>
